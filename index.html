<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VinylPuffin</title>
  </head>
  <body>
    <script type="module">
      // Keep the app in `vinylpuffin.html`, but allow using `/` as the Spotify redirect URI.
      // Works on GitHub Pages (where the base path is `/<repo>/`) and preserves ?code=...
      const baseUrl = new URL(import.meta.env.BASE_URL, window.location.origin);
      const target = new URL("vinylpuffin.html", baseUrl);
      target.search = window.location.search;
      target.hash = window.location.hash;
      window.location.replace(target.toString());
    </script>
  </body>
</html>

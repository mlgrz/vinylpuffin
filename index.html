<!doctype html>
<html lang="en">
  <head>
    <link rel="icon" href="./assets/img/puffin.ico" type="image/x-icon" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VinylPuffin</title>
  </head>
  <body>
    <p>Loading VinylPuffin…</p>
    <p>
      If you’re not redirected,
      <a id="open-link" href="./vinylpuffin.html">open the app</a>.
    </p>
    <script>
      // Keep the app in `vinylpuffin.html`, but allow using `/` as the Spotify redirect URI.
      // Works on GitHub Pages (where the base path is `/<repo>/`) and preserves ?code=...
      const base = location.pathname.endsWith("/")
        ? location.pathname
        : location.pathname.replace(/[^/]*$/, "");
      const target =
        base + "vinylpuffin.html" + location.search + location.hash;
      document.getElementById("open-link").href =
        "./vinylpuffin.html" + location.search + location.hash;
      location.replace(target);
    </script>
  </body>
</html>
